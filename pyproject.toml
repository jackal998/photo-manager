[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = false

[tool.isort]
profile = "black"
line_length = 100
combine_as_imports = true
force_sort_within_sections = true
default_section = "THIRDPARTY"
known_first_party = ["app", "core", "infrastructure"]

[tool.ruff]
line-length = 100
target-version = "py311"
fix = true

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "C4"]
ignore = ["E501", "I001"]

[tool.ruff.lint.isort]
known-first-party = ["app", "core", "infrastructure"]
combine-as-imports = true

[tool.pylint.main]
py-version = "3.11"
extension-pkg-allow-list = ["PySide6", "PIL"]

[tool.pylint.typecheck]
generated-members = ["PySide6.*"]

[tool.pylint.design]
max-attributes = 24
min-public-methods = 0
max-locals = 55
max-statements = 140
# Allow Windows API structure naming patterns
good-names = ["Data1", "Data2", "Data3", "Data4", "GUID", "SIZE", "BITMAP", "BITMAPINFO", "BITMAPINFOHEADER"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.variables]
additional-builtins = ["Data1", "Data2", "Data3", "Data4"]

[tool.pytest.ini_options]
addopts = "-q --cov=. --cov-report=term-missing --cov-report=json --cov-config=pyproject.toml"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["scanner", "core", "infrastructure", "app"]
omit = [
  "tests/*",
  "scripts/*",
  ".claude/*",
  # qa/ is the layer-3 driver harness itself (subprocess spawning,
  # UIA interaction, scenario configuration). It can't be exercised
  # inside the layer-1 test process by design. The one pure-logic
  # piece — qa/scenarios/_batch.select_shard — is unit-tested in
  # tests/test_batch_shard.py; the rest is layer-3 plumbing that
  # runs every time qa.scenarios._batch is invoked locally or in
  # the qa-batch CI workflow (#188 sharded across 3 jobs).
  "qa/*",
  # `omit` is reserved for files that genuinely cannot be exercised
  # inside the layer-1 test process. Each entry below carries (a) why
  # it isn't reachable from unit tests, and (b) where it IS covered
  # (layer-2 integration / layer-3 qa-explore / manual). Anything NOT
  # in this list must clear the per-file 70% floor enforced by
  # scripts/check_coverage_per_file.py. See docs/testing.md for the
  # full layer model.
  "main.py",                          # argparse + sys.exit shell; covered by qa-explore launching the real app
  "run_all_linters.py",               # dev tooling shell, not user-facing
  "infrastructure/image_service.py",  # requires running QApplication for decode; covered by qa-explore preview pane (s05)
  "infrastructure/logging.py",        # module-level loguru sink setup; no executable surface beyond import
  # The four files below are the qa-explore territory of the preview
  # stack: Qt-widget rendering + QThreadPool dispatch + Qt MediaPlayer
  # coordination. They are loaded into the layer-1 coverage report the
  # moment any unit test instantiates ExecuteActionDialog with a
  # task_runner (#165) — which exercises only constructor + show_single
  # + clear, well below the 70% per-file floor. Layer-3 covers the
  # real surface (rendering, fit-on-width, video lifecycle). The
  # layer-1 cascade is noise (see feedback_test_import_cascade.md).
  "app/views/preview_pane.py",                       # Qt rendering, image fit + video player wiring; covered by qa-explore s05 (huge preview) + s11 (video live)
  "app/views/image_tasks.py",                        # QThreadPool dispatch + signal plumbing; covered by qa-explore s05 + s44 (highlighted-rows preview)
  "app/views/widgets/group_media_controller.py",     # group video play/pause coordinator; covered by qa-explore s11
  "app/views/widgets/video_player.py",               # QMediaPlayer + QVideoWidget wrapper; covered by qa-explore s11
]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
]
fail_under = 80
