[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = false

[tool.isort]
profile = "black"
line_length = 100
combine_as_imports = true
force_sort_within_sections = true
default_section = "THIRDPARTY"
known_first_party = ["app", "core", "infrastructure"]

[tool.ruff]
line-length = 100
target-version = "py311"
fix = true

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "C4"]
ignore = ["E501", "I001"]

[tool.ruff.lint.isort]
known-first-party = ["app", "core", "infrastructure"]
combine-as-imports = true

[tool.pylint.main]
py-version = "3.11"
extension-pkg-allow-list = ["PySide6", "PIL"]

[tool.pylint.typecheck]
generated-members = ["PySide6.*"]

[tool.pylint.design]
max-attributes = 24
min-public-methods = 0
max-locals = 55
max-statements = 140
# Allow Windows API structure naming patterns
good-names = ["Data1", "Data2", "Data3", "Data4", "GUID", "SIZE", "BITMAP", "BITMAPINFO", "BITMAPINFOHEADER"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.variables]
additional-builtins = ["Data1", "Data2", "Data3", "Data4"]

[tool.pytest.ini_options]
addopts = "-q --cov=. --cov-report=term-missing --cov-config=pyproject.toml"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["scanner", "core", "infrastructure", "app"]
omit = [
  "tests/*",
  "scripts/*",
  ".claude/*",
  # Top-level entry-point scripts and dev tooling
  "main.py",
  "scan.py",
  "review.py",
  "run_all_linters.py",
  # Qt/UI glue and bootstrap — low test ROI
  "infrastructure/image_service.py",
  "infrastructure/logging.py",
  "app/views/workers/scan_worker.py",
  "app/views/media_utils.py",
]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
]
fail_under = 80
