[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = false

[tool.isort]
profile = "black"
line_length = 100
combine_as_imports = true
force_sort_within_sections = true
default_section = "THIRDPARTY"
known_first_party = ["app", "core", "infrastructure"]

[tool.ruff]
line-length = 100
target-version = "py311"
fix = true

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "C4"]
ignore = ["E501", "I001"]

[tool.ruff.lint.isort]
known-first-party = ["app", "core", "infrastructure"]
combine-as-imports = true

[tool.pylint.main]
py-version = "3.11"
extension-pkg-allow-list = ["PySide6", "PIL"]

[tool.pylint.typecheck]
generated-members = ["PySide6.*"]

[tool.pylint.design]
max-attributes = 24
min-public-methods = 0
max-locals = 55
max-statements = 140
# Allow Windows API structure naming patterns
good-names = ["Data1", "Data2", "Data3", "Data4", "GUID", "SIZE", "BITMAP", "BITMAPINFO", "BITMAPINFOHEADER"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.variables]
additional-builtins = ["Data1", "Data2", "Data3", "Data4"]

[tool.pytest.ini_options]
addopts = "-q --cov=. --cov-report=term-missing --cov-report=json --cov-config=pyproject.toml"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["scanner", "core", "infrastructure", "app"]
omit = [
  "tests/*",
  "scripts/*",
  ".claude/*",
  # qa/ is the layer-3 driver harness itself (subprocess spawning,
  # UIA interaction, scenario configuration). It can't be exercised
  # inside the layer-1 test process by design. The one pure-logic
  # piece — qa/scenarios/_batch.select_shard — is unit-tested in
  # tests/test_batch_shard.py; the rest is layer-3 plumbing that
  # runs every time qa.scenarios._batch is invoked locally or in
  # the qa-batch CI workflow (#188 sharded across 3 jobs).
  "qa/*",
  # `omit` is reserved for files that genuinely cannot be exercised
  # inside the layer-1 test process. Each entry below carries (a) why
  # it isn't reachable from unit tests, and (b) where it IS covered
  # (layer-2 integration / layer-3 qa-explore / manual). Anything NOT
  # in this list must clear the per-file 70% floor enforced by
  # scripts/check_coverage_per_file.py. See docs/testing.md for the
  # full layer model.
  "main.py",                          # argparse + sys.exit shell; covered by qa-explore launching the real app
  "run_all_linters.py",               # dev tooling shell, not user-facing
  "infrastructure/image_service.py",  # requires running QApplication for decode; covered by qa-explore preview pane (s05)
  "infrastructure/logging.py",        # module-level loguru sink setup; no executable surface beyond import
  # Files previously omitted as "the qa-explore territory of the
  # preview / dialog-dispatch stacks" — loaded into the layer-1
  # coverage report by two distinct triggers:
  #   * #165 / #260 — instantiating ExecuteActionDialog with a
  #     task_runner pulls in preview_pane + image_tasks + video_player.
  #   * #185 — importing MainWindow at layer 1 transitively imports
  #     the same set.
  # The cascade is noise (see feedback_test_import_cascade.md);
  # each file gets a focused L1 surface via helper extraction +
  # fake-self thin-proxy tests, then is removed from this list.
  # Status of the original five cascade-omits:
  #   group_media_controller.py — cleared by #285 (76%)
  #   dialog_handler.py         — cleared by #293 (90%)
  #   image_tasks.py            — cleared by #293 (100%)
  #   video_player.py           — cleared by #293 (87%)
  #   preview_pane.py           — stays omitted; see note below
  #
  # preview_pane.py NOTE (final #185 PR): the testable surface is
  # extracted to app/views/preview_pane_helpers.py (10 helpers, 99%
  # covered) + 25 fake-self dispatch tests in tests/test_preview_pane.py.
  # The remaining ~330 stmts in preview_pane.py are genuine Qt-widget
  # assembly (show_grid tile-build, resizeEvent geometry, VideoPlayerWidget
  # instantiation) that can't be unit-tested without mocking
  # QGridLayout / QLabel / QVBoxLayout — the exact "mock-the-world"
  # padding CLAUDE.md rejects. The L3 scenarios s01/s05/s11/s48
  # exercise the real surface. The owner's 2026-05-16 comment on
  # #185 explicitly flagged this file as needing the genuine-vs-
  # padding discipline that landed us at "extract what's pure, keep
  # the rest at L3."
  "app/views/preview_pane.py",                       # Heavy Qt widget assembly; testable surface extracted to preview_pane_helpers.py (99%); rest is QGridLayout/QLabel construction covered by L3 (s01/s05/s11/s48)
  "app/views/dialogs/singleton_prune_confirm_dialog.py",  # Two-button Qt confirm + checkbox (#426); decision contract layer-1 tested via TestSingletonPruneOffer with the dialog's `.ask` classmethod patched (same pattern locked_rows / execute_action dialogs use). The widget assembly itself needs a real QApplication; L3 coverage is the s13/s44 destructive-flow tail.
]

[tool.towncrier]
name = "photo-manager"
filename = "CHANGELOG.md"
directory = "news"
title_format = "## [{version}] - {project_date}"
issue_format = "[#{issue}](https://github.com/jackal998/photo-manager/issues/{issue})"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "feature"
name = "Features"
showcontent = true

[[tool.towncrier.type]]
directory = "bugfix"
name = "Bug Fixes"
showcontent = true

[[tool.towncrier.type]]
directory = "doc"
name = "Documentation"
showcontent = true

[[tool.towncrier.type]]
directory = "removal"
name = "Removals"
showcontent = true

[[tool.towncrier.type]]
directory = "misc"
name = "Miscellaneous"
showcontent = true

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
]
fail_under = 80
