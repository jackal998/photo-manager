scan_dialog:
  title: "掃描來源"
  # #425 — 原本是「不會搬移或刪除任何檔案」;改為描述硬碟狀態而非操作。
  notice: "唯讀掃描 — 不會異動硬碟上的任何檔案。"
  browse_group: "瀏覽來源資料夾:"
  path_label: "路徑:"
  path_placeholder: "貼上或輸入絕對資料夾路徑…"
  path_not_found: "找不到資料夾:{path}"
  add_button: "+ 新增"
  add_selected_button: "+ 新增所選資料夾"
  source_list_header: "來源資料夾:"
  remove_all: "全部移除"
  table_col_path: "路徑"
  table_col_recursive: "包含子資料夾"
  tooltip_remove: "從清單移除"
  output_label: "清單檔儲存至:"
  output_placeholder: "輸出清單路徑 (.sqlite)"
  browse_button: "瀏覽…"
  save_dialog_title: "儲存清單為"
  advanced_settings_label: "進階設定"
  phash_label: "<b>pHash 相似度閾值</b> (預設:10,範圍:1–20)"
  phash_desc: "兩張影像之間的感知雜湊 Hamming 距離。64 位元的 pHash 表示兩張影像最多可相差此位元數,即被視為近似重複。<b>越低 = 越嚴格</b> (群組較少,雜訊較少);<b>越高 = 越寬鬆</b> (可抓到更多輕微編輯過的影像對)。"
  color_label: "<b>平均色彩閘門</b> (預設:30,範圍:0–100)"
  color_desc: "兩張影像之間平均 RGB 色彩的 L2 距離。在 pHash 檢查之後,平均色彩差距超過此值的影像將被排除於分組之外 — 用以排除 pHash 假陽性 (DCT 結構相似但色彩不同)。<b>0 = 停用</b>;<b>越高 = 越寬鬆</b>。"
  auto_select_label: "掃描後自動選取"
  auto_select_desc: "啟用時,掃描結束後會立即將每個重複群組中分數最高的檔案標記為 <b>KEEP</b> 並鎖定該列 (樹狀清單會顯示鎖頭圖示),避免之後批次套用正規式時意外覆蓋保留者。自動選取只挑選保留者,不會挑選刪除者 — 除非您同時啟用下方的進階選項。"
  auto_select_aggressive_label: "同時將其他檔案標記為刪除"
  auto_select_aggressive_desc: "<b>偏向破壞性,需明確選用。</b> 與自動選取一同啟用時,每個有分數的群組中,所有非保留者皆會被標記為 <b>刪除</b>。執行動作對話框會以完整的整理結果開啟 — 一鍵即可送出整批處理。實際刪除動作仍須透過標準的執行流程確認。"
  recalibrate_label: "下次掃描時重新校準雜湊池"
  recalibrate_desc: "啟用時,下次掃描會先用一小批檔案實測 thread 與 process 兩種雜湊方式的速度,將雜湊池切換為 <b>auto</b>,並記住這台機器 + 資料夾組合下較快的選擇。校準後此選項會自動取消勾選 — 之後重掃同一個庫會直接沿用記住的結果。更換硬體或想重新測量時再勾選一次。"
  calibrate_modal_title: "雜湊池尚未校準"
  calibrate_modal_body: "auto 雜湊池模式在這台機器與資料夾組合下還沒有校準資料。要現在校準嗎 (在本次掃描開始時跑一個快速計時樣本),還是這次先退回安全的 thread 池?"
  calibrate_modal_calibrate: "現在校準"
  calibrate_modal_thread: "使用 thread (安全)"
  workers_label: "<b>雜湊執行緒數</b> (預設:8,範圍:1–32)"
  workers_desc: "雜湊階段的平行讀取數量。針對 NAS / SMB 來源 <b>調高</b> (8–16 通常可使 NAS 掃描時間減半,受限於分享的 <code>smb max mux</code>);若掃描時其他應用程式變慢則 <b>調低</b>。對話框啟動時,若任一來源位於網路磁碟機則自動採用 8,否則採用 4。"
  log_placeholder: "掃描進度將顯示於此…"
  # #424 — 顯示於進度面板的階段名稱。
  stage_walk: "正在掃描來源"
  stage_hash: "正在計算雜湊"
  stage_exiftool: "正在讀取 EXIF 與評分訊號"
  stage_classify: "正在分類重複項"
  stage_score: "正在評分候選"
  stage_write: "正在寫入清單"
  start_button: "開始掃描"
  close_button: "關閉"
  close_load_button: "關閉並載入"
  log_starting: "正在開始掃描…"
  log_error: "\n錯誤:{error}"
  no_sources_title: "未指定來源"
  no_sources_body: "請至少新增一個來源資料夾。"
  no_output_title: "未指定輸出"
  no_output_body: "請指定清單檔的輸出路徑。"
  scan_failed_title: "掃描失敗"

execute_dialog:
