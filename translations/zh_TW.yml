    exit: "結束"
  action:
    title: "動作(&A)"
    by_regex: "依欄位/正規式設定動作…"
    execute: "執行動作…"
  list:
    title: "清單(&L)"
    remove: "從清單移除"
  log:
    title: "紀錄(&G)"
    open_latest: "開啟最新紀錄"
