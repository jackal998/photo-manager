  no_match_title: "設定動作 — 無相符項目"
  no_match_body: "沒有檔案符合此正規式。"
  invalid_regex_title: "正規式錯誤"
  set_action_by_regex_menu: "依欄位設定動作…"
  files_not_found_title: "找不到檔案"
  files_not_found_body: "下列檔案找不到,已略過:\n\n{missing}{suffix}"
  files_not_found_more: "\n…以及其餘 {n} 個"
  files_failed_title: "刪除失敗"
  files_failed_body: "下列檔案無法刪除(權限不足、檔案鎖定或路徑過長):\n\n{failed}{suffix}"
  files_failed_more: "\n…以及其餘 {n} 個"

# SingletonPruneConfirmDialog — photo-manager#426. 破壞性動作之後,
# 提示是否清除只剩單一檔案的群組(它們不再具有重複審查價值)。
singleton_prune_confirm:
  title: "清除單一檔案群組?"
  body: "上次操作之後,有 {count} 個群組只剩下一個檔案。這些群組已不再是重複審查的候選項。\n\n要從清單移除這 {count} 個單一檔案群組嗎?"
  body_mixed: "上次操作之後,有 {count_plain} 個群組只剩下一個檔案。另有 {count_actioned} 個單一檔案仍帶有「尚未執行」的動作。\n\n要從清單移除這 {count_plain} 個「無待處理動作」的單一檔案嗎?"
  body_actioned_only: "有 {count_actioned} 個單一檔案仍帶有「尚未執行」的動作(刪除 / 從清單移除)。\n\n仍要把這 {count_actioned} 個從清單移除嗎?"
  checkbox_include_actioned: "一併移除 {count} 個帶有「尚未執行」動作的單一檔案"
  checkbox_dont_ask: "記住我的選擇,不要再詢問"
  btn_remove: "移除 {count} 個"
  btn_keep: "全部保留"

# LockedRowsConfirmDialog — photo-manager#182(取代 #175 的混合語意)。
locked_confirm:
  title: "受影響的鎖定列"
  body: "動作「{action}」會影響 {total} 列;其中 {locked} 列已鎖定:\n\n{list}\n\n要解除鎖定並套用至全部 {total} 列、只套用至未鎖定的 {unlocked} 列,還是取消?"
  body_all_locked: "動作「{action}」會影響 {locked} 列,全部已鎖定:\n\n{list}\n\n要解除鎖定並全部套用,還是取消?"
