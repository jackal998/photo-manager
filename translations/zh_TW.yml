  discard_pending_body: |
    目前載入的清單上有 {pending} 尚未儲存。

    重新掃描會取代目前的清單。如果掃描輸出路徑與目前清單路徑相同,這些決策將永久從硬碟上消失;否則先前的清單仍會保留在硬碟上,但不再顯示於此視窗。

    若要保留這些決策,請先選擇「檔案 → 儲存清單決策…」。

    確定要重新掃描嗎?

