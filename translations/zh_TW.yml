# photo-manager — 繁體中文 (Traditional Chinese, Taiwan).
#
# Source of truth: translations/en.yml. Keep keys identical.
# Conventions follow Taiwan Mandarin: 檔案 (file), 資料夾 (folder),
# 掃描 (scan), 縮圖 (thumbnail), 設定 (settings), 預覽 (preview).

_meta:
  display_name: 繁體中文
  locale: zh_TW

menu:
  file:
    title: "檔案(&F)"
    scan_sources: "掃描來源…"
    open_manifest: "開啟清單檔…"
    save_manifest: "儲存清單決策…"
    exit: "結束"
  action:
    title: "動作(&A)"
    by_regex: "依欄位設定動作…"
    execute: "執行動作…"
    execute_selected_only: "執行動作 (僅選取項目)…"
  list:
    title: "清單(&L)"
    remove: "從清單移除"
  log:
    title: "紀錄(&G)"
    open_latest: "開啟最新紀錄"
    open_latest_delete: "開啟最新刪除紀錄"
    open_directory: "開啟紀錄資料夾"
    open_delete_directory: "開啟刪除紀錄資料夾"
  view:
    title: "檢視(&V)"
    language:
      title: "語言"

main_window:
  title: "Photo Manager"
  status_ready: "就緒"
  empty_state: "尚未載入清單檔。\n\n請從「檔案 → 掃描來源…」開始。"
  empty_state_scan_button: "掃描來源…"
  empty_state_open_button: "開啟清單檔…"
