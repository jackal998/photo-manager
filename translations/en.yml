  button_back: "Back"

# Language switch confirmation — fires before the live window rebuild.
language:
  confirm_title: "Switch language?"
  confirm_body: "Switch language to {language}?\n\nThe window will rebuild — your loaded manifest and decisions stay intact, but any open dialog will close."

