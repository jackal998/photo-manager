# photo-manager — English string catalog (canonical reference).
#
# This file is the single source of truth for every user-facing string
# in the app. To add a new locale: copy this file to <locale>.yml and
# translate every value. Keys must stay identical — they're how the
# code looks strings up.
#
# Conventions:
#   * The "&X" prefix marks an Alt-key mnemonic. Translators may move
#     it to a different letter (or remove it for languages where Alt
#     mnemonics aren't used).
#   * "…" is the proper ellipsis character (U+2026), not three dots.
#   * Format placeholders use named braces: {n}, {path}. Never {} or
#     positional {0}.
#   * HTML inside <b>...</b> is rendered by Qt — keep tags around the
#     same conceptual phrase when translating.

_meta:
  display_name: English
  locale: en

menu:
  file:
    title: "&File"
    scan_sources: "Scan Sources…"
    open_manifest: "Open Manifest…"
    save_manifest: "Save Manifest Decisions…"
    exit: "Exit"
  action:
    title: "&Action"
    by_regex: "Set Action by Field…"
    execute: "Execute Action…"
    # #410: sibling of "execute" that pre-filters the dialog to groups
    # containing currently-selected file rows in the main tree. Gated
    # in MainWindow.on_tree_selection_changed — disabled when no rows
    # are selected so the affordance is discoverable rather than the
    # in-dialog tree-selection re-narrowing it replaces.
    execute_selected_only: "Execute Action (only selected)…"
  list:
    title: "&List"
    remove: "Remove from List"
  log:
    title: "Lo&g"
    open_latest: "Open Latest Log"
    open_latest_delete: "Open Latest Delete Log"
    open_directory: "Open Log Directory"
    open_delete_directory: "Open Delete Log Directory"
  view:
    title: "&View"
    language:
      title: "Language"

main_window:
  title: "Photo Manager"
  status_ready: "Ready"
  empty_state: "No manifest loaded.\n\nFile → Scan Sources… to begin."
  empty_state_scan_button: "Scan Sources…"
  empty_state_open_button: "Open Manifest…"
  status_loaded: "Loaded manifest: {parts}"
  load_error_title: "Load Manifest Error"
  discard_pending_title: "Discard pending decisions?"
  discard_pending_body: |
    You have {pending} on the loaded manifest.

    Re-scanning will replace the loaded manifest. If the scan output path matches the loaded manifest path, those decisions will be permanently lost on disk; otherwise the previous manifest is preserved on disk but no longer visible in this window.

    Save first via File → Save Manifest Decisions… if you want to keep them.

    Proceed with the re-scan?

# Column headers shown in the main tree view.
column:
  similarity: "Similarity"
  action: "Action"
  lock: "Lock"
  file_name: "File Name"
  folder: "Folder"
  size_bytes: "Size (Bytes)"
  group_count: "Group Count"
  creation_date: "Creation Date"
  shot_date: "Shot Date"
  resolution: "Resolution"
  score: "Score"

# Tree row values — the "Group 5" label and similarity tags shown in
# the main tree view next to each group / file.
tree:
  group_label: "Group {n}"
  similarity_ref: "Ref"
  similarity_near_dup: "~dup"
  # #241 — within a group, only one row carries "Ref"; other Ref-tier
  # rows (e.g. Live Photo MOV passenger sibling of an HEIC primary,
  # multi-source duplicates that union-find collapsed into one group)
  # render this neutral sentinel rather than confusingly repeating "Ref".
  similarity_passenger: "—"

# Decision labels shown in context menus and the action dialog.
# The stored value is internal ("delete" / "") — only the label is
# user-facing.
decision:
  delete: "delete"
  keep: "keep"
  remove_from_list: "remove from list"
  lock: "lock"
  unlock: "unlock"

# Friendly row labels for the scan-dialog progress log's action-count
# summary table (scanner.manifest.print_summary). The raw action
# strings ("KEEP", "MOVE", "EXACT", "REVIEW_DUPLICATE", "UNDATED")
# stay internal — they drive sort order and tree rendering — but the
# user only sees these labels.
manifest_summary:
  keep: "kept (no action)"
  move: "to be moved"
  exact: "exact duplicates"
  review_duplicate: "near-duplicates (review)"
  undated: "no shot date"
  other: "other"

# ScanDialog and its inner panels.
scan_dialog:
  title: "Scan Sources"
  notice: "Read-only scan — no files are moved or deleted."
  browse_group: "Browse source folders:"
  path_label: "Path:"
  path_placeholder: "Paste or type an absolute folder path…"
  path_not_found: "Folder not found: {path}"
  add_button: "+ Add"
  add_selected_button: "+ Add Selected Folder"
  source_list_header: "Source folders:"
  remove_all: "Remove All"
  table_col_path: "Path"
  table_col_recursive: "Recursive"
  tooltip_remove: "Remove from list"
  output_label: "Save manifest to:"
  output_placeholder: "Output manifest path (.sqlite)"
  browse_button: "Browse…"
  save_dialog_title: "Save Manifest As"
  advanced_settings_label: "Advanced settings"
  phash_label: "<b>pHash Similarity Threshold</b> (default: 10, range: 1–20)"
  phash_desc: "Perceptual hash Hamming distance between two images. A 64-bit pHash means images can differ by at most this many bits before being flagged as near-duplicates. <b>Lower = stricter</b> (fewer groups, less noise); <b>higher = more permissive</b> (catches more slightly-edited pairs)."
  color_label: "<b>Mean Color Gate</b> (default: 30, range: 0–100)"
  color_desc: "L2 distance between the average RGB color of two images. After the pHash check, images whose mean colors differ by more than this value are excluded from grouping — catching pHash false positives where similar DCT structure but different colors were matched. <b>0 = disabled</b>; <b>higher = more permissive</b> color gate."
  auto_select_label: "Auto select after scan"
  auto_select_desc: "When enabled, the highest-scoring file in each duplicate group is marked <b>KEEP</b> and the row is locked (lock badge in the tree) so accidental bulk-regex applies can't overwrite the keeper. Auto-select picks keepers, never deleters — unless you also enable the aggressive option below."
  auto_select_aggressive_label: "Also mark all other files for delete"
  auto_select_aggressive_desc: "<b>Destructive-leaning, opt-in.</b> When enabled together with Auto select, every non-keeper row in a scored group is marked for <b>delete</b>. The Execute Action dialog opens with the full triage pre-populated — one click ships the sweep. You still confirm the actual deletion through the standard execute flow."
  log_placeholder: "Scan progress will appear here…"
  start_button: "Start Scan"
  close_button: "Close"
  close_load_button: "Close && Load"
  log_starting: "Starting scan…"
  log_error: "\nERROR: {error}"
  no_sources_title: "No sources"
  no_sources_body: "Please add at least one source folder."
  no_output_title: "No output"
  no_output_body: "Please specify an output path for the manifest."
  scan_failed_title: "Scan Failed"

# ExecuteActionDialog — final review before destructive ops.
execute_dialog:
  title: "Execute Actions — Review"
  select_button: "Select by Field/Regex…"
  set_action_menu: "Set Action"
  execute_button: "Execute"
  close_button: "Close"
  summary_decided: "<b>{count}</b> file(s) with decisions: {n_delete} delete. Right-click a file row to change its decision."
  summary_none: "No decisions set — use 'Set Action' to mark files for deletion."
  warning_complete_groups: "⚠ Group(s) {groups} will have ALL files deleted. Review decisions below before clicking Execute."
  confirm_all_title: "All Files Will Be Deleted"
  confirm_all_body: "Group(s) {groups} will have EVERY file deleted.\n\nFiles will be sent to the Recycle Bin. Continue?"
  no_match_title: "Set Action — No Match"
  no_match_body: "No files matched the pattern."
  invalid_regex_title: "Invalid Regex"
  set_action_by_regex_menu: "Set Action by Field…"
  files_not_found_title: "Files Not Found"
  files_not_found_body: "The following files could not be found and were skipped:\n\n{missing}{suffix}"
  files_not_found_more: "\n…and {n} more"
  files_failed_title: "Files Failed to Delete"
  files_failed_body: "The following files could not be deleted (permission denied, locked, or path too long):\n\n{failed}{suffix}"
  files_failed_more: "\n…and {n} more"

# LockedRowsConfirmDialog — unified confirm when an action would touch
# locked rows. See photo-manager#182 (supersedes #175's hybrid).
locked_confirm:
  title: "Locked Rows Affected"
  body: "Action '{action}' would affect {total} row(s); {locked} locked:\n\n{list}\n\nUnlock and apply to all {total}, apply to unlocked only ({unlocked}), or cancel?"
  body_all_locked: "Action '{action}' would affect {locked} row(s), all locked:\n\n{list}\n\nUnlock and apply to all, or cancel?"
  list_truncated_suffix: "  …and {n} more"
  btn_unlock_apply: "Unlock && Apply to All"
  btn_unlocked_only: "Apply to Unlocked Only"
  btn_cancel: "Cancel"

# DeleteRegexConfirmDialog — D3 from #350 (Wave 10). Confirm gate
# inserted before regex-driven bulk delete only; other actions emit
# immediately. Cancel is the default focus + Esc target.
delete_regex_confirm:
  title: "Confirm bulk-delete decision"
  body: "This will mark {matched} files for deletion via {pattern_summary}.\n\nFiles will be sent to the Recycle Bin when you run Execute Action — this cannot be easily undone."
  confirm_button: "Mark {matched} files for deletion"
  cancel: "Cancel"

# ActionDialog (Set Action by Field).
action_dialog:
  title: "Set Action by Field"
  field_label: "Field:"
  regex_label: "Regex:"
  regex_placeholder: "e.g. ^IMG_\\d+\\.HEIC$"
  # B12 from #348 (Wave 9b-trim): label rewords from the generic
  # "Set Action:" to make the per-row scope explicit — the chosen
  # action applies to EVERY matched row, not to one row or the group.
  # #416: reverts #407's "Set status…" rename — "action" is the
  # canonical user-facing noun (decision/status are internal).
  # Three sibling labels (action_dialog.title,
  # execute_dialog.set_action_menu, context_menu.set_action) always
  # said "Set Action…"; this realigns the combo label with them.
  set_action_label: "Set action for each match:"
  # D10 from #350 (Wave 9a): keyboard mnemonics via "&X" — Alt+X fires the
  # button. Allocations: A=Apply, R=Recent, S=Switch to Regex,
  # W=Reset (W)indow size. (#391 dropped C=Close — button removed,
  # dismissal goes via Esc / title-bar X.) No internal collisions;
  # main-menu mnemonics are blocked while the dialog is
  # ApplicationModal so no external risk.
  apply_button: "&Apply"
  # E5 from #351 (Wave 8): clears persisted window+splitter geometry so
  # the dialog reopens at default size. Mode/field/op preferences are
  # NOT touched — they live under settings.json, not window_state.ini.
  reset_window_size_button: "Reset &window size"
  reset_window_size_tooltip: "Reset dialog window size and pane split to defaults (Ctrl+0). Does not affect Mode, Field, or recent patterns."
  # D3 from #350 (Wave 10): human-readable pattern summary for the
  # delete-confirm dialog body. Simple mode shows op + text; Regex mode
  # shows the raw pattern; numeric mode shows the comparison expression.
  pattern_summary_simple: "{field} {op} '{text}'"
  pattern_summary_regex: "{field} regex '{pattern}'"
  pattern_summary_numeric_threshold: "{field} {op} {value}"
  pattern_summary_numeric_topn: "{order} {n} per group by {field}"
  preview_label: "Preview"
  match_counter: "{matched} of {total} match"
  # B6 from #348 (Wave 5): Top-N mode counter — "{matched} matched"
  # with the per-group context that Top-N specifically operates on
  # (≤N per group × number-of-groups). Regex and Threshold modes
  # keep the simpler ``match_counter`` shape since they apply
  # across all records, not per-group.
  match_counter_topn: "{matched} matched (≤{n} per group × {group_count} groups)"
  match_counter_invalid: "—"
  # B9 from #348 (Wave 9b-trim): post-Apply flash in the match counter.
  # Confirms the action emit landed without duplicating the main-window
  # status bar's "Decision set to ..." emit (#316/#318) — this surfaces
  # the same news inside the dialog the user is actively looking at.
  match_counter_applied: "Applied to {matched} rows"
  invalid_regex: "Invalid regex: {error}"
  # A4 from #347 (Wave 5): shown when the threshold input is non-empty
  # but ``_parse_threshold`` can't read it as a number or ISO date.
  invalid_threshold: "Couldn't parse '{input}' as a value for this field"
  preview_truncated: "…and {n} more"
  preview_empty: "No matches"
  # Phase B/C — Simple / Regex mode toggle and friends. ("Simple"
  # #396 dropped the Simple/Regex mode toggle and the
  # "complex pattern" affordance built around hiding state:
  # mode_label, mode_simple, mode_regex, simple_complex_notice,
  # and switch_to_regex are gone. Both sections are always visible
  # and share self.regex as the single source of truth.
  simple_prefix: "Find rows where it"
  simple_op_contains: "contains"
  simple_op_starts_with: "starts with"
  simple_op_ends_with: "ends with"
  simple_op_exact: "exactly matches"
  simple_text_placeholder: "type the text to match…"
  # #396 C1 informational-placeholder note: shown above the disabled
  # Simple inputs when match_fn is None (no live-preview data source).
  # Italic + muted-color in the dialog; this text is the only signal
  # explaining why the inputs aren't interactive.
  simple_disabled_no_match_fn: "Write-through preview unavailable — Simple inputs are read-only on this entry point."
  cheatsheet_label: "Insert into pattern:"
  cheatsheet_any: ".* — any text"
  cheatsheet_digit: "\\d — digit"
  cheatsheet_word: "\\w — word char"
  cheatsheet_start: "^ — start"
  cheatsheet_end: "$ — end"
  cheatsheet_dot: "\\. — literal dot"
  cheatsheet_set: "[abc] — any of these chars"
  # C16 from #349 (Wave 8): dropdown arrow now rendered via QStyle's
  # standard SP_ArrowDown icon (theme-aware glyph). Keep label text only.
  recent_button: "&Recent"
  recent_empty: "(no recent patterns)"
  recent_clear: "Clear recent patterns"
  # #209 — numeric-condition panel. Shown when the selected field is
  # numeric-capable (Size, Group Count, Similarity, Score, Creation
  # Date, Shot Date) and the dialog was opened with the raw groups
  # (i.e. from the Execute Action dialog). Replaces the regex/simple
  # panels in that case.
  numeric_mode_threshold: "Threshold"
  numeric_mode_topn: "Top N per group"
  numeric_threshold_label: "Where the value is"
  numeric_topn_label: "Pick the"
  numeric_topn_suffix: "in each group"
  numeric_order_top: "Top"
  numeric_order_bottom: "Bottom"
  numeric_value_placeholder_number: "type a number…"
  numeric_value_placeholder_date: "type a date (YYYY-MM-DD)…"
  cmp_op_gt: ">"
  cmp_op_ge: ">="
  cmp_op_lt: "<"
  cmp_op_le: "<="
  cmp_op_eq: "=="
  cmp_op_ne: "!="

