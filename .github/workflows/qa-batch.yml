name: qa-batch

# Run the layer-3 qa-explore batch on every PR. Goal: catch driver-vs-app
# label drift and state-transition regressions before merge, instead of
# relying on a manual `python -m qa.scenarios._batch` discipline (#74).
#
# No `paths:` filter — the principle is "every PR, every check." Tooling /
# docs / hook PRs pay the runner cost (~15–20 min on windows-latest) for
# the consistency of a single uniform CI posture. Same shape as
# .github/workflows/tests.yml. If runner cost ever bites, the right fix
# is to make the batch faster (parallelise scenarios, prune slow ones),
# not to silently skip it on a class of PRs.
#
# Status: NON-REQUIRED, informational. Per #74's acceptance criteria, this
# workflow needs ≥10 consecutive flake-free runs on real PRs before being
# promoted to a required status check via branch protection. Until then,
# treat a red qa-batch as a signal to investigate, not a merge blocker.
#
# Sharding (#188). The batch is split across 3 parallel jobs via
# strategy.matrix to bring wall-clock from ~15–20 min down toward ~6–7 min.
# Selection is sorted-stride in qa/scenarios/_batch.py::select_shard, which
# also keeps s23a/s23b in the same shard (s23b reads what s23a wrote).

on:
  pull_request:
    branches: [master]
  workflow_dispatch: {}   # allow manual trigger from the Actions UI for debugging

concurrency:
  # Shard number is part of the key: GitHub Actions cancels by group, and
  # we want all 3 shards of the same PR to coexist. Without "-shard…",
  # the second shard to start would cancel the first.
  group: qa-batch-${{ github.head_ref || github.ref }}-shard${{ matrix.shard }}
  cancel-in-progress: true

# Public-repo hardening: workflow is read-only, no write back to the repo,
# no token-scoped operations. Locking permissions explicitly here keeps it
# audit-ready and resilient to future GitHub default changes.
permissions:
  contents: read

jobs:
  qa:
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      # Don't cancel sibling shards when one fails — we want a full picture
      # of which scenarios failed across the whole batch from a single run.
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt
            qa/requirements.txt

      # exiftool is a runtime boundary the scanner uses for HEIC / RAW / MOV /
      # MP4 metadata. Chocolatey is preinstalled on windows-latest runners.
      - name: Install exiftool
        run: choco install exiftool -y --no-progress

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
          pip install -r qa/requirements.txt

      # Idempotent fixture builder. Generates qa/sandbox/ on a fresh checkout.
      - name: Build qa sandbox fixtures
        run: python scripts/make_qa_sandbox.py

      - name: Run qa batch
        id: batch
        shell: pwsh
        env:
          QT_ACCESSIBILITY: '1'
          # Pin DPI so pixel-coord clicks (s17, s20) match local-dev positions.
          QT_SCALE_FACTOR: '1'
          QT_AUTO_SCREEN_SCALE_FACTOR: '0'
          # Force unbuffered stdout so the live log surfaces in the runner UI.
          PYTHONUNBUFFERED: '1'
          # Unicode arrows / ellipsis in driver output: avoid cp1252 encode errors.
          PYTHONIOENCODING: 'utf-8'
          # Switch QFileDialog to Qt's non-native widget on hosted runners
          # (#129). The Windows native IFileSaveDialog modal loop only pumps
          # COM messages, so synthesized input from pywinauto / UIA is
          # silently dropped on windows-latest. Qt's non-native dialog
          # responds to UIA normally, so s12_save_manifest can drive it
          # end-to-end here. Local users still get the native dialog.
          PHOTO_MANAGER_QT_FILE_DIALOG: '1'
        run: |
          # Force UTF-8 for PowerShell's stdout decode/encode pipeline so
          # box-drawing chars (─ U+2500) and other non-ASCII Unicode in
          # the scanner's summary banner render correctly in the runner
          # log instead of mojibake (`â”€` for `─`). Python writes UTF-8
          # via PYTHONIOENCODING above, but PowerShell on hosted runners
          # defaults to the OEM codepage for child-process I/O.
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          python -m qa.scenarios._batch --shard ${{ matrix.shard }} --total-shards 3 2>&1 | Tee-Object -FilePath qa-batch.log
          # Forward the batch's exit code; PowerShell pipes default to the
          # tail-element rc which is Tee-Object's (always 0). The variable
          # `$LASTEXITCODE` from the python invocation is what matters.
          exit $LASTEXITCODE

      # Always emit a per-scenario rc summary to the job page so triage from
      # the PR is one click. Runs even on failure so we see WHICH scenarios
      # failed without digging through the full log.
      - name: Per-scenario summary
        if: always()
        shell: pwsh
        run: |
          $heading = '## QA batch summary (shard ${{ matrix.shard }}/3)'
          if (Test-Path qa-batch.log) {
            Add-Content $env:GITHUB_STEP_SUMMARY $heading
            Add-Content $env:GITHUB_STEP_SUMMARY ''
            Add-Content $env:GITHUB_STEP_SUMMARY '```'
            Select-String -Path qa-batch.log -Pattern '^=====|^total:|^\s+\[(OK|FAIL)\]' |
              ForEach-Object { $_.Line } |
              Add-Content $env:GITHUB_STEP_SUMMARY
            Add-Content $env:GITHUB_STEP_SUMMARY '```'
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY $heading
            Add-Content $env:GITHUB_STEP_SUMMARY ''
            Add-Content $env:GITHUB_STEP_SUMMARY '_qa-batch.log was not produced — see the "Run qa batch" step for setup-time errors._'
          }

      # Upload the full log so debugging a failed scenario doesn't require
      # re-running CI. 7-day retention is plenty for triage cycles. The name
      # is suffixed with the shard number because upload-artifact@v4 rejects
      # duplicate names within a single workflow run.
      - name: Upload full batch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-batch-log-shard${{ matrix.shard }}
          path: qa-batch.log
          if-no-files-found: ignore
          retention-days: 7

      # Belt-and-braces cleanup. The runner is ephemeral so this rarely
      # matters, but a hung main.py from a flaky scenario can leave
      # background processes that confuse subsequent steps within the same
      # job. Always exit 0 — failure in cleanup must not mask the real result.
      - name: Cleanup any leaked python.exe
        if: always()
        shell: pwsh
        run: |
          taskkill /F /IM python.exe /T 2>$null
          exit 0
